<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="styles.css">
  <title>Report a Barangay Issue</title>
</head>
<body>

  <div id="back-link-wrapper">
    <a id="back-link" href="homepage.html">&#8592; Go Back</a>
  </div>

  <form id="report-form" action="homepage.html" method="get">

    <h2 id="page-title">Report a Barangay Issue</h2>
    <p id="page-subtitle">Fill out the form below to submit a barangay issue report.</p>
    <hr id="divider-top">

    <div id="issue-type-group">
      <label id="issue-type-label">Type of Issue:</label>

      <input type="radio" id="normal" name="issue_level" value="normal">
      <label for="normal" id="label-normal">Minor, non-urgent concern</label>

      <input type="radio" id="medium" name="issue_level" value="medium">
      <label for="medium" id="label-medium">Needs attention soon</label>

      <input type="radio" id="critical" name="issue_level" value="critical">
      <label for="critical" id="label-critical">Urgent, requires immediate action</label>
    </div>

    <div id="description-group">
      <label for="description" id="description-label">Description:</label>
      <textarea id="description" name="description" placeholder="Describe the issue in detail..."></textarea>
    </div>

    <div id="location-group">
      <label for="location" id="location-label">Location of Issue:</label>
      <input type="text" id="location" name="location" placeholder="e.g. Near the barangay hall, Rizal St.">
    </div>

    <div id="photo-group">
      <label for="photo" id="photo-label">Attach Photo (optional):</label>
      <input type="file" id="photo" name="photo" accept="image/*">
    </div>

    <hr id="divider-bottom">

    <div id="form-actions">
      <input type="submit" id="btn-submit" value="Submit Report">
      <button id="btn-cancel" type="button" onclick="location.href='homepage.html'">Cancel</button>
    </div>

  </form>

</body>
</html>
