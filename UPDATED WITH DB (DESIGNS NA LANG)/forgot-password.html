<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bantay Barangay | Forgot Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(145deg, #e6f1fb 0%, #b5d4f4 100%);
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .login-container {
      max-width: 440px;
      width: 100%;
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 4px 12px rgba(0,0,0,0.05);
      overflow: hidden;
      animation: fadeSlideUp 0.4s ease-out;
    }

    .login-header {
      background: #0c447c;
      padding: 2rem;
      text-align: center;
      border-bottom: 6px solid #378add;
      position: relative;
    }
    .login-header h1 { color: white; font-size: 1.8rem; font-weight: 700; }
    .login-header p  { color: #d4e8f9; margin-top: 0.5rem; font-size: 0.88rem; }

    .btn-back {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none; color: white;
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      text-decoration: none; line-height: 1;
    }
    .btn-back:hover { background: rgba(255,255,255,0.3); }

    .login-form { padding: 2rem; }

    .instruction-text {
      font-size: 0.88rem;
      color: #475569;
      margin-bottom: 1.5rem;
      line-height: 1.6;
      text-align: center;
      background: #f5f9fe;
      border-radius: 1rem;
      padding: 1rem;
      border: 1.5px solid #b5d4f4;
    }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-weight: 600; color: #042c53; margin-bottom: 0.5rem; font-size: 0.88rem; }

    .form-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid #b5d4f4;
      border-radius: 1rem;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: #f5f9fe;
      font-family: inherit;
    }
    .form-group input:focus {
      outline: none;
      border-color: #378add;
      box-shadow: 0 0 0 3px rgba(55,138,221,0.2);
      background: #fff;
    }

    .password-wrapper { position: relative; display: flex; align-items: center; }
    .password-wrapper input { padding-right: 3rem; }
    .toggle-password {
      position: absolute; right: 1rem;
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: #378add; padding: 0.2rem; user-select: none;
    }

    .password-strength {
      margin-top: 0.5rem;
      font-size: 0.78rem;
      font-weight: 600;
      display: none;
    }
    .strength-weak   { color: #e24b4a; }
    .strength-medium { color: #f4b942; }
    .strength-strong { color: #22c55e; }

    .btn-login {
      width: 100%;
      background: #0c447c;
      color: white; border: none;
      padding: 0.9rem;
      font-size: 1rem; font-weight: 600;
      border-radius: 3rem; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .btn-login:hover { background: #185fa5; transform: translateY(-2px); box-shadow: 0 8px 18px rgba(12,68,124,0.25); }
    .btn-login:active { transform: translateY(1px); }
    .btn-login:disabled { background: #8da396; cursor: not-allowed; transform: none; box-shadow: none; }

    .register-container {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.88rem;
      color: #042c53;
    }
    .register-container a { color: #378add; text-decoration: none; font-weight: 600; }
    .register-container a:hover { color: #0c447c; text-decoration: underline; }

    /* STATUS OVERLAY */
    .status-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 999;
      align-items: center; justify-content: center; padding: 1.5rem;
    }
    .status-overlay.active { display: flex; }

    .status-card {
      background: white; border-radius: 1.75rem;
      padding: 2.5rem 2rem; max-width: 380px; width: 100%;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.2);
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .status-icon {
      width: 90px; height: 90px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem; font-size: 2.5rem;
    }
    .status-icon.success  { background: #e1f7e9; }
    .status-icon.error    { background: #fdecec; }
    .status-icon.pending  { background: #fff3e0; }

    .status-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.6rem; }
    .status-title.success  { color: #145c35; }
    .status-title.error    { color: #8b1c1c; }
    .status-title.pending  { color: #804d00; }

    .status-msg { font-size: 0.88rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .status-msg.success  { color: #145c35; }
    .status-msg.error    { color: #5a1c1c; }
    .status-msg.pending  { color: #5a3a00; }

    .status-badge {
      display: inline-block; font-size: 0.75rem; font-weight: 700;
      padding: 4px 14px; border-radius: 2rem; margin-bottom: 1.25rem;
    }
    .status-badge.success { background: #e1f7e9; color: #145c35; border: 1.5px solid #22c55e; }
    .status-badge.error   { background: #fdecec; color: #8b1c1c; border: 1.5px solid #e24b4a; }
    .status-badge.pending { background: #fff3e0; color: #804d00; border: 1.5px solid #f4b942; }

    .btn-close-status {
      background: #0c447c; color: white; border: none;
      padding: 0.75rem 2rem; border-radius: 3rem;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background 0.2s;
    }
    .btn-close-status:hover { background: #185fa5; }
    .btn-close-status.error-btn { background: #e24b4a; }
    .btn-close-status.error-btn:hover { background: #c03333; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <a href="login.html" class="btn-back" title="Back to login">✕</a>
      <h1>🏛️ Bantay Barangay</h1>
      <p>Password Reset Request</p>
    </div>

    <div class="login-form">
      <div class="instruction-text">
        🔐 Ilagay ang iyong username at ang bagong password na gusto mo.<br>
        <small style="color:#64748b;">Ang iyong request ay irereview ng admin bago ma-approve.</small>
      </div>

      <div class="form-group">
        <label>👤 Username</label>
        <input type="text" id="username" placeholder="Ilagay ang iyong username" autocomplete="username">
      </div>

      <div class="form-group">
        <label>🔒 Bagong Password</label>
        <div class="password-wrapper">
          <input type="password" id="newPassword" placeholder="Ilagay ang bagong password" autocomplete="new-password" oninput="checkStrength()">
          <button type="button" class="toggle-password" onclick="togglePass('newPassword', this)">👁️</button>
        </div>
        <div class="password-strength" id="strengthMsg"></div>
      </div>

      <div class="form-group">
        <label>🔒 Ulitin ang Bagong Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" placeholder="Ulitin ang bagong password" autocomplete="new-password">
          <button type="button" class="toggle-password" onclick="togglePass('confirmPassword', this)">👁️</button>
        </div>
      </div>

      <button class="btn-login" id="submitBtn" onclick="handleSubmit()">📨 Isumite ang Request</button>

      <div class="register-container" style="margin-top:1rem;">
        Naaalala mo na ba? <a href="login.html">Bumalik sa Login</a>
      </div>
    </div>
  </div>

  <div class="status-overlay" id="statusOverlay">
    <div class="status-card" id="statusCard"></div>
  </div>

  <script>
    function togglePass(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }

    function checkStrength() {
      const val = document.getElementById('newPassword').value;
      const el  = document.getElementById('strengthMsg');
      if (!val) { el.style.display = 'none'; return; }
      el.style.display = 'block';
      if (val.length < 6) {
        el.textContent = '⚠️ Mahina — hindi bababa sa 6 na character';
        el.className = 'password-strength strength-weak';
      } else if (val.length < 10 || !/[0-9]/.test(val)) {
        el.textContent = '🟡 Katamtaman — dagdag ng numero para mas malakas';
        el.className = 'password-strength strength-medium';
      } else {
        el.textContent = '✅ Malakas na password!';
        el.className = 'password-strength strength-strong';
      }
    }

    function showStatus(type, msg) {
      const card = document.getElementById('statusCard');
      const configs = {
        success: {
          icon: '✅', badgeClass: 'success', badgeText: '✅ REQUEST SENT',
          titleClass: 'success', title: 'Request Submitted!',
          msgClass: 'success', btnClass: '', btnText: 'Okay',
          onClose: () => { window.location.href = 'login.html'; }
        },
        error: {
          icon: '❌', badgeClass: 'error', badgeText: '❌ FAILED',
          titleClass: 'error', title: 'Hindi Na-submit',
          msgClass: 'error', btnClass: 'error-btn', btnText: 'Subukan Ulit',
          onClose: null
        },
        notfound: {
          icon: '🔍', badgeClass: 'error', badgeText: '❌ NOT FOUND',
          titleClass: 'error', title: 'Username Hindi Nahanap',
          msgClass: 'error', btnClass: 'error-btn', btnText: 'Subukan Ulit',
          onClose: null
        },
        pending: {
          icon: '⏳', badgeClass: 'pending', badgeText: '⏳ EXISTING REQUEST',
          titleClass: 'pending', title: 'May Pending Request Ka Na',
          msgClass: 'pending', btnClass: '', btnText: 'Okay',
          onClose: null
        }
      };
      const c = configs[type] || configs.error;
      window._onStatusClose = c.onClose;

      card.innerHTML = `
        <div class="status-icon ${type === 'success' ? 'success' : type === 'pending' ? 'pending' : 'error'}" style="font-size:2.5rem;">${c.icon}</div>
        <span class="status-badge ${c.badgeClass}">${c.badgeText}</span>
        <div class="status-title ${c.titleClass}">${c.title}</div>
        <div class="status-msg ${c.msgClass}">${msg}</div>
        <button class="btn-close-status ${c.btnClass}" onclick="closeStatus()">${c.btnText}</button>`;
      document.getElementById('statusOverlay').classList.add('active');
    }

    function closeStatus() {
      document.getElementById('statusOverlay').classList.remove('active');
      if (typeof window._onStatusClose === 'function') window._onStatusClose();
    }

    function handleSubmit() {
      const username = document.getElementById('username').value.trim();
      const newPass  = document.getElementById('newPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;
      const btn      = document.getElementById('submitBtn');

      if (!username || !newPass || !confirm) {
        showStatus('error', 'Kumpletuhin ang lahat ng fields.');
        return;
      }
      if (newPass.length < 6) {
        showStatus('error', 'Ang password ay hindi bababa sa 6 na character.');
        return;
      }
      if (newPass !== confirm) {
        showStatus('error', 'Hindi magkatugma ang mga password. Subukan ulit.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Nagpapadala...';

      fetch('forgot_password.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `username=${encodeURIComponent(username)}&new_password=${encodeURIComponent(newPass)}`
      })
      .then(r => r.json())
      .then(data => {
        btn.disabled = false;
        btn.textContent = '📨 Isumite ang Request';

        if (data.success) {
          showStatus('success', 'Ang iyong password reset request ay naipadala na sa admin. Hintayin ang approval bago subukang mag-login ulit.');
        } else if (data.status === 'not_found') {
          showStatus('notfound', 'Walang account na may username na iyan. Siguraduhing tama ang spelling.');
        } else if (data.status === 'pending') {
          showStatus('pending', 'Mayroon ka nang pending na password reset request. Hintayin muna ang admin na mag-review nito.');
        } else {
          showStatus('error', data.message || 'May error na nangyari. Subukan ulit.');
        }
      })
      .catch(() => {
        btn.disabled = false;
        btn.textContent = '📨 Isumite ang Request';
        showStatus('error', 'Hindi ma-connect sa server. Subukan ulit.');
      });
    }

    ['username','newPassword','confirmPassword'].forEach(id => {
      document.getElementById(id).addEventListener('keypress', e => {
        if (e.key === 'Enter') handleSubmit();
      });
    });
  </script>
</body>
</html>
