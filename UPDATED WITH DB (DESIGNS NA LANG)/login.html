<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bantay Barangay | Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(145deg, #e6f1fb 0%, #b5d4f4 100%);
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .login-container {
      max-width: 440px;
      width: 100%;
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 4px 12px rgba(0,0,0,0.05);
      overflow: hidden;
      animation: fadeSlideUp 0.4s ease-out;
    }

    .login-header {
      background: #0c447c;
      padding: 2rem;
      text-align: center;
      border-bottom: 6px solid #378add;
      position: relative;
    }
    .login-header h1 { color: white; font-size: 1.8rem; font-weight: 700; }
    .login-header p  { color: #d4e8f9; margin-top: 0.5rem; font-size: 0.88rem; }

    .login-form { padding: 2rem; }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-weight: 600; color: #042c53; margin-bottom: 0.5rem; font-size: 0.88rem; }

    .form-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid #b5d4f4;
      border-radius: 1rem;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: #f5f9fe;
      font-family: inherit;
    }
    .form-group input:focus {
      outline: none;
      border-color: #378add;
      box-shadow: 0 0 0 3px rgba(55,138,221,0.2);
      background: #fff;
    }

    .password-wrapper { position: relative; display: flex; align-items: center; }
    .password-wrapper input { padding-right: 3rem; }
    .toggle-password {
      position: absolute; right: 1rem;
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: #378add; padding: 0.2rem; user-select: none;
    }

    /* ── CAPTCHA ── */
    .captcha-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }
    .captcha-row img {
      border-radius: 0.75rem;
      border: 1.5px solid #b5d4f4;
      flex-shrink: 0;
      display: block;
      width: 160px;
      height: 56px;
    }
    .captcha-refresh {
      background: #f5f9fe;
      border: 1.5px solid #b5d4f4;
      border-radius: 0.75rem;
      width: 56px;
      height: 56px;
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.15s;
      font-family: inherit;
    }
    .captcha-refresh:hover { background: #e6f1fb; }
    .captcha-refresh:active { transform: rotate(180deg); }
    .form-group input.captcha-input { text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

    /* honeypot field - hidden from real users */
    .hp-field {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    .btn-login {
      width: 100%;
      background: #0c447c;
      color: white;
      border: none;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 3rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-login:hover { background: #185fa5; transform: translateY(-2px); box-shadow: 0 8px 18px rgba(12,68,124,0.25); }
    .btn-login:active { transform: translateY(1px); }
    .btn-login:disabled { background: #8da396; cursor: not-allowed; transform: none; box-shadow: none; }

    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0 4px;
      font-size: 0.88rem;
    }
    .login-options label { display: flex; align-items: center; gap: 6px; color: #042c53; cursor: pointer; }
    .login-options input[type="checkbox"] { width: auto; margin: 0; }
    .login-options a { color: #378add; text-decoration: none; font-weight: 600; }
    .login-options a:hover { text-decoration: underline; }

    .register-container {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.88rem;
      color: #042c53;
    }
    .register-container a { color: #378add; text-decoration: none; font-weight: 600; }
    .register-container a:hover { color: #0c447c; text-decoration: underline; }

    /* STATUS OVERLAY */
    .status-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .status-overlay.active { display: flex; }

    .status-card {
      background: white;
      border-radius: 1.75rem;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.2);
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .status-icon {
      width: 90px; height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 2.5rem;
    }
    .status-icon.pending  { background: #fff3e0; }
    .status-icon.rejected { background: #fdecec; }
    .status-icon.error    { background: #fdecec; }

    .ring-pending {
      width: 90px; height: 90px;
      border-radius: 50%;
      border: 4px solid #f4b942;
      border-top-color: transparent;
      animation: spin 1.2s linear infinite;
      position: absolute;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-icon.pending { position: relative; }

    .status-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.6rem; }
    .status-title.pending  { color: #804d00; }
    .status-title.rejected { color: #8b1c1c; }
    .status-title.error    { color: #8b1c1c; }

    .status-msg { font-size: 0.88rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .status-msg.pending  { color: #5a3a00; }
    .status-msg.rejected { color: #5a1c1c; }
    .status-msg.error    { color: #5a1c1c; }

    .status-badge {
      display: inline-block;
      font-size: 0.75rem; font-weight: 700;
      padding: 4px 14px;
      border-radius: 2rem;
      margin-bottom: 1.25rem;
      letter-spacing: 0.5px;
    }
    .status-badge.pending  { background: #fff3e0; color: #804d00; border: 1.5px solid #f4b942; }
    .status-badge.rejected { background: #fdecec; color: #8b1c1c; border: 1.5px solid #e24b4a; }

    .btn-close-status {
      background: #0c447c; color: white; border: none;
      padding: 0.75rem 2rem; border-radius: 3rem;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background 0.2s;
    }
    .btn-close-status:hover { background: #185fa5; }
    .btn-close-status.rejected-btn { background: #e24b4a; }
    .btn-close-status.rejected-btn:hover { background: #c03333; }

    .clock-svg { width: 44px; height: 44px; }

    .btn-back {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      text-decoration: none;
      line-height: 1;
    }
    .btn-back:hover { background: rgba(255,255,255,0.3); }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <a href="index.html" class="btn-back" title="Back to frontpage">✕</a>
      <h1>🏛️ Bantay Barangay</h1>
      <p>Citizen Services Portal</p>
    </div>
    <div class="login-form">

      <div class="form-group">
        <label>👤 Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
      </div>

      <div class="form-group">
        <label>🔒 Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
        </div>
      </div>

      <!-- ── CAPTCHA ── -->
      <div class="form-group">
        <label>🔐 Enter the code shown below</label>
        <div class="captcha-row">
          <img id="captchaImg" src="captcha.php" alt="Captcha code">
          <button type="button" class="captcha-refresh" onclick="refreshCaptcha()" title="Refresh code">🔄</button>
        </div>
        <input type="text" id="captchaInput" class="captcha-input" placeholder="Type the code here" autocomplete="off" maxlength="6">
      </div>

      <!-- ── HONEYPOT (hidden from real users, bots tend to fill this) ── -->
      <div class="hp-field" aria-hidden="true">
        <label for="website">Website</label>
        <input type="text" id="website" name="website" autocomplete="off" tabindex="-1">
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">Login →</button>

      <div class="login-options">
        <label><input type="checkbox" id="rememberMe"> Remember Me</label>
        <a href="forgot-password.html">Forgot Password?</a>
      </div>

      <div class="register-container">
        Don't have an account? <a href="registration.html">Register here</a>
      </div>

    </div>
  </div>

  <!-- STATUS OVERLAY -->
  <div class="status-overlay" id="statusOverlay">
    <div class="status-card" id="statusCard"></div>
  </div>

  <script>
    // ── AUTO-REDIRECT IF SESSION EXISTS ──────────────────────────────────────
    fetch('login_session.php')
      .then(r => r.json())
      .then(d => {
        if (d.loggedIn) {
          window.location.href = 'homepage.php';
        }
      })
      .catch(() => {}); // silently ignore if no session file yet

    // ── REMEMBER ME ──────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('bb_remember');
      if (saved) {
        document.getElementById('username').value = saved;
        document.getElementById('rememberMe').checked = true;
      }
    });

    // ── TOGGLE PASSWORD ───────────────────────────────────────────────────────
    function togglePassword() {
      const inp = document.getElementById('password');
      const btn = document.querySelector('.toggle-password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }

    // ── CAPTCHA REFRESH ───────────────────────────────────────────────────────
    function refreshCaptcha() {
      const img = document.getElementById('captchaImg');
      img.src = 'captcha.php?t=' + Date.now(); // cache-bust
      document.getElementById('captchaInput').value = '';
    }

    // ── FORM LOAD TIME (for bot timing check) ─────────────────────────────────
    const formLoadTime = Date.now();

    // ── ENTER KEY ────────────────────────────────────────────────────────────
    ['username','password','captchaInput'].forEach(id => {
      document.getElementById(id).addEventListener('keypress', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });

    // ── SHOW STATUS OVERLAY ───────────────────────────────────────────────────
    function showStatus(type) {
      const card = document.getElementById('statusCard');

      if (type === 'pending') {
        card.innerHTML = `
          <div class="status-icon pending">
            <div class="ring-pending"></div>
            <svg class="clock-svg" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="22" cy="22" r="18" stroke="#f4b942" stroke-width="3"/>
              <line x1="22" y1="12" x2="22" y2="22" stroke="#f4b942" stroke-width="3" stroke-linecap="round"/>
              <line x1="22" y1="22" x2="29" y2="27" stroke="#f4b942" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="status-badge pending">⏳ UNDER REVIEW</span>
          <div class="status-title pending">Account Under Review</div>
          <div class="status-msg pending">
            Your account is still being verified by the barangay admin.<br><br>
            Please wait for approval before logging in. This usually takes 1–2 business days.
          </div>
          <button class="btn-close-status" onclick="closeStatus()">Got it</button>`;
      } else if (type === 'rejected') {
        card.innerHTML = `
          <div class="status-icon rejected">
            <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="22" cy="22" r="18" stroke="#e24b4a" stroke-width="3"/>
              <line x1="14" y1="14" x2="30" y2="30" stroke="#e24b4a" stroke-width="3.5" stroke-linecap="round"/>
              <line x1="30" y1="14" x2="14" y2="30" stroke="#e24b4a" stroke-width="3.5" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="status-badge rejected">❌ ACCESS DENIED</span>
          <div class="status-title rejected">Account Not Approved</div>
          <div class="status-msg rejected">
            Your registration has been reviewed and was not approved.<br><br>
            If you believe this is a mistake, please visit the barangay hall or contact the administrator.
          </div>
          <button class="btn-close-status rejected-btn" onclick="closeStatus()">Close</button>`;
      } else if (type === 'invalid') {
        card.innerHTML = `
          <div class="status-icon error">
            <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="22" cy="22" r="18" stroke="#e24b4a" stroke-width="3"/>
              <line x1="22" y1="13" x2="22" y2="26" stroke="#e24b4a" stroke-width="3.5" stroke-linecap="round"/>
              <circle cx="22" cy="31" r="2" fill="#e24b4a"/>
            </svg>
          </div>
          <span class="status-badge rejected">⚠️ LOGIN FAILED</span>
          <div class="status-title error">Invalid Credentials</div>
          <div class="status-msg rejected">
            The username or password you entered is incorrect.<br>Please check and try again.
          </div>
          <button class="btn-close-status rejected-btn" onclick="closeStatus()">Try Again</button>`;
      } else if (type === 'captcha') {
        card.innerHTML = `
          <div class="status-icon pending">
            <div class="ring-pending"></div>
            <svg class="clock-svg" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="22" cy="22" r="18" stroke="#f4b942" stroke-width="3"/>
              <line x1="22" y1="12" x2="22" y2="22" stroke="#f4b942" stroke-width="3" stroke-linecap="round"/>
              <line x1="22" y1="22" x2="29" y2="27" stroke="#f4b942" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="status-badge pending">⚠️ CAPTCHA FAILED</span>
          <div class="status-title pending">Verification Failed</div>
          <div class="status-msg pending">
            The code you entered did not match.<br><br>
            Please try again with the new code shown below.
          </div>
          <button class="btn-close-status" onclick="closeStatus(); refreshCaptcha();">Try Again</button>`;
      } else if (type === 'bot') {
        card.innerHTML = `
          <div class="status-icon error">
            <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="22" cy="22" r="18" stroke="#e24b4a" stroke-width="3"/>
              <line x1="22" y1="13" x2="22" y2="26" stroke="#e24b4a" stroke-width="3.5" stroke-linecap="round"/>
              <circle cx="22" cy="31" r="2" fill="#e24b4a"/>
            </svg>
          </div>
          <span class="status-badge rejected">⚠️ SUBMISSION TOO FAST</span>
          <div class="status-title error">Please Try Again</div>
          <div class="status-msg rejected">
            Your submission was sent too quickly. Please wait a moment and try again.
          </div>
          <button class="btn-close-status rejected-btn" onclick="closeStatus(); refreshCaptcha();">Try Again</button>`;
      }

      document.getElementById('statusOverlay').classList.add('active');
    }

    function closeStatus() {
      document.getElementById('statusOverlay').classList.remove('active');
    }

    // ── LOGIN ─────────────────────────────────────────────────────────────────
    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('rememberMe').checked;
      const captcha  = document.getElementById('captchaInput').value.trim();
      const honeypot = document.getElementById('website').value;
      const btn = document.getElementById('loginBtn');

      // ── Honeypot check: real users never fill this ──
      if (honeypot !== '') {
        showStatus('bot');
        return;
      }

      // ── Timing check: too-fast submission is likely a bot ──
      const elapsedMs = Date.now() - formLoadTime;
      if (elapsedMs < 1500) {
        showStatus('bot');
        return;
      }

      if (!username || !password) {
        showStatus('invalid');
        return;
      }

      if (!captcha) {
        showStatus('captcha');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      const body = `username=${encodeURIComponent(username)}`
                  + `&password=${encodeURIComponent(password)}`
                  + `&captcha=${encodeURIComponent(captcha)}`
                  + `&elapsed=${encodeURIComponent(elapsedMs)}`
                  + `&website=${encodeURIComponent(honeypot)}`;

      fetch('login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body
      })
      .then(r => r.json())
      .then(data => {
        btn.disabled = false;
        btn.textContent = 'Login →';

        if (remember) {
          localStorage.setItem('bb_remember', username);
        } else {
          localStorage.removeItem('bb_remember');
        }

        if (data.success) {
          window.location.href = 'homepage.php';
        } else if (data.status === 'pending') {
          showStatus('pending');
        } else if (data.status === 'rejected') {
          showStatus('rejected');
        } else if (data.status === 'captcha') {
          showStatus('captcha');
        } else if (data.status === 'bot') {
          showStatus('bot');
        } else {
          showStatus('invalid');
          refreshCaptcha();
        }
      })
      .catch(() => {
        btn.disabled = false;
        btn.textContent = 'Login →';
        showStatus('invalid');
      });
    }
  </script>
</body>
</html>
