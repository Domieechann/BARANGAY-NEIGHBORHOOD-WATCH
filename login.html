<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bantay Barangay | Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #e6f1fb 0%, #b5d4f4 100%);
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .login-container {
      max-width: 440px;
      width: 100%;
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 4px 12px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      animation: fadeSlideUp 0.4s ease-out;
    }

    .login-header {
      background: #0c447c;
      background-image: radial-gradient(circle at 10% 30%, rgba(55, 138, 221, 0.2) 2%, transparent 2.5%),
                        radial-gradient(circle at 85% 70%, rgba(181, 212, 244, 0.1) 1.8%, transparent 2%);
      background-size: 40px 40px, 32px 32px;
      padding: 2rem;
      text-align: center;
      border-bottom: 6px solid #378add;
    }

    .login-header h1 {
      color: white;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .login-header p {
      color: #d4e8f9;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    .login-form {
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      color: #042c53;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .form-group label span, .register-container span, .demo-note span {
      font-weight: 400;
      color: #5a738e;
      font-size: 0.8rem;
      display: inline-block;
    }

    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .form-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid #b5d4f4;
      border-radius: 1rem;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      background: #f5f9fe;
      font-family: inherit;
    }

    .password-wrapper input {
      padding-right: 3rem;
    }

    .form-group input:focus {
      outline: none;
      border-color: #378add;
      box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.2);
      background: #ffffff;
    }

    .toggle-password {
      position: absolute;
      right: 1rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: #378add;
      padding: 0.2rem;
      user-select: none;
    }

    .btn-login {
      width: 100%;
      background: #0c447c;
      color: white;
      border: none;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 3rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-login:hover {
      background: #185fa5;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(12, 68, 124, 0.25);
    }

    .btn-login:active {
      transform: translateY(1px);
    }

    .register-container {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.9rem;
      color: #042c53;
    }

    .register-container a {
      color: #378add;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .register-container a:hover {
      color: #0c447c;
      text-decoration: underline;
    }

    .demo-note {
      background: #e6f1fb;
      border-left: 4px solid #378add;
      padding: 0.9rem 1rem;
      border-radius: 1rem;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #0c447c;
    }

    .demo-note code {
      background: #b5d4f4;
      padding: 0.2rem 0.4rem;
      border-radius: 0.4rem;
      font-size: 0.75rem;
    }

    .error-msg {
      background: #fee2e2;
      color: #dc2626;
      padding: 0.75rem;
      border-radius: 0.8rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      display: none;
      border-left: 4px solid #dc2626;
      line-height: 1.4;
    }
    .login-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  margin-bottom: 15px;
  font-size: 0.9rem;
}

.login-options label {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #042c53;
  cursor: pointer;
}

.login-options input[type="checkbox"] {
  width: auto;
  margin: 0;
}

.login-options a {
  color: #378add;
  text-decoration: none;
  font-weight: 600;
}

.login-options a:hover {
  text-decoration: underline;
}
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🏛️ Bantay Barangay</h1>
      <p>Citizen Services Portal Login / Pag-log in sa Portal ng Serbisyo ng Mamamayan</p>
    </div>
    <div class="login-form">
      <div id="errorMsg" class="error-msg"></div>
      
      <div class="form-group">
        <label>👤 Username <span>/ Pangalan ng User</span></label>
        <input type="text" id="username" placeholder="Enter your username (Ilagay ang username)">
      </div>
      
      <div class="form-group">
        <label>🔒 Password <span>/ Password</span></label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter your password (Ilagay ang password)">
          <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">👁️</button>
        </div>
      </div>
      
      <button class="btn-login" onclick="handleLogin()">Login → (Mag-log in)</button>

      <div class="login-options">
        <label>
        <input type="checkbox" id="rememberMe">
          Remember Me
      </label>

       <a href="forgot-password.html">Forgot Password?</a>
    </div>

<div class="register-container">

      <div class="demo-note">
        <strong>📢 Demo Credentials <span>/ Katibayan para sa Demo</span>:</strong><br>
        • Resident (Maninirahan): <code>resident / resident123</code><br>
        • Super Admin (Punong Tagapangasiwa): <code>admin / admin123</code>
      </div>
    </div>
  </div>

  <script>
    // Handles user authentication, session storage, and page redirects.
    function handleLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMsg');

      const users = {
        resident: { password: 'resident123', role: 'resident', redirect: 'homepage.html' },
        admin: { password: 'admin123', role: 'superadmin', redirect: 'superadmin.html' }
      };

      if (users[username] && users[username].password === password) {
        sessionStorage.setItem('loggedInUser', JSON.stringify({
          username: username,
          role: users[username].role
        }));
        window.location.href = users[username].redirect;
      } else {
        errorDiv.innerHTML = '❌ Invalid username or password. Please try again.<br><span>(Maling username o password. Pakisubukang muli.)</span>';
        errorDiv.style.display = 'block';
        setTimeout(() => {
          errorDiv.style.display = 'none';
        }, 4000);
      }
    }

    // Toggles password input visibility between masked and plain text.
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const toggleBtn = document.querySelector('.toggle-password');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.textContent = '🙈';
      } else {
        passwordInput.type = 'password';
        toggleBtn.textContent = '👁️';
      }
    }

    // Checks for an existing session on load and redirects authenticated users.
    if (sessionStorage.getItem('loggedInUser')) {
      const user = JSON.parse(sessionStorage.getItem('loggedInUser'));
      if (user.role === 'superadmin') {
        window.location.href = 'superadmin.html';
      } else {
        window.location.href = 'homepage.html';
      }
    }

    // Submits login data when Enter key is pressed in the username field.
    document.getElementById('username').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleLogin();
    });

    // Submits login data when Enter key is pressed in the password field.
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
